spring:
  application:
    name: trade-demo
  profiles:
    active: local

  # 데이터베이스 기본 설정
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/game_trade?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
